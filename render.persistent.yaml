# 正式環境用：Starter 方案 + Persistent Disk，訓練／驗收資料重啟後仍保留。
# 在 Render Dashboard → Blueprint → 改用此檔，或手動升級現有服務並掛載磁碟。
#
# 費用參考（2026）：Starter Web ~$7/月 + 1GB 磁碟 ~$0.25/月
# 文件：https://render.com/docs/disks

services:
  - type: web
    name: agri-detect
    runtime: python
    plan: starter
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: agri-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATA_DIR
        value: /opt/render/project/src/data
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: CWA_API_KEY
        sync: false
      - key: LINE_NOTIFY_TOKEN
        sync: false
      - key: PUSH_WEBHOOK_URL
        sync: false
      - key: WEATHER_CRON_ENABLED
        value: "true"
      - key: WEATHER_CRON_HOURS
        value: "3"
      - key: FCM_SERVER_KEY
        sync: false
      - key: APP_VERSION
        sync: false
