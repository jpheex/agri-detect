services:
  - type: web
    name: agri-detect
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATA_DIR
        value: /opt/render/project/src/data
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: CWA_API_KEY
        sync: false
      - key: LINE_NOTIFY_TOKEN
        sync: false
      - key: PUSH_WEBHOOK_URL
        sync: false
      - key: WEATHER_CRON_ENABLED
        value: "true"
      - key: WEATHER_CRON_HOURS
        value: "3"
      - key: FCM_SERVER_KEY
        sync: false
      - key: APP_VERSION
        sync: false
